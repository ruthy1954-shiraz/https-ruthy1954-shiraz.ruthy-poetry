<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <title>האתר של רותי</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <!-- תמונת הספר -->
    <div class="song-image">
        <img src="content/images/shir.jpeg" alt="עטיפת הספר לגעת">
    </div>

    <!-- כותרות -->
    <h1 class="song-title">לגעת</h1>
    <h2 class="song-author">ספר השירה של רות שנן</h2>

    <!-- טקסט פתיחה -->
    <div class="song-box">
        <p>
            רגע לפני שהמילים נולדות,<br>
            היד נוגעת בדף,<br>
            והלב נפתח.<br><br>
            הזמנה לגעת, להרגיש, להקשיב.
        </p>
    </div>

    <!-- ניווט -->
    <div class="footer-nav" style="margin-top:20px;">
        <a href="content/song.html">שירים</a> |
        <a href="content/about.html">על הספר</a>
    </div>

    <!-- תיבת הערות -->
    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>

        <!-- שם הכותב -->
        <input id="userName" placeholder="השם שלך..." />

        <!-- שם הדף -->
        <input id="userSong" placeholder="שם הדף..." value="דף הבית" />

        <!-- הערה -->
        <textarea id="userNote" placeholder="כתבי כאן את מחשבותייך על האתר..."></textarea>

        <!-- קישורים במקום כפתורים -->
        <div class="footer-nav" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a> |
            <a id="saveLink">שמירת הערה</a>
        </div>

        <h4>הערות שנשמרו:</h4>
        <div id="notes"></div>
    </div>

</div>

<!-- מזהה ייחודי לדף הבית -->
<script>
    var songId = "homepage";
</script>

<!-- מערכת ההערות + ווצאפ -->
<script type="module">
    import { initNoteSystem, saveNoteToFirestore } from "./notes.js";

    const waLink = document.getElementById("waLink");
    const saveLink = document.getElementById("saveLink");

    const phone = "972545305123";

    // שליחת הודעה בווצאפ
    waLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        const message =
            `שם הכותב: ${name}\n` +
            `שם הדף: ${song}\n` +
            `הערה: ${note}`;

        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
    });

    // שמירת הערה בענן
    saveLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        saveNoteToFirestore(name, song, note, songId);
    });

    initNoteSystem();
</script>

</body>
</html>
